<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>SYSTEM // ABOUT</title> <style> /* --- CSS STYLES --- */ /* Reset & Base Setup */ * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; } body, html { width: 100%; height: 100%; background-color: #030305; color: #e0e0e0; overflow: hidden; } /* Canvas Background */ #system-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; } /* Main Container */ .interface-container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 2rem; } /* Header & Pulse */ .sys-header { display: flex; align-items: center; gap: 15px; margin-bottom: 4rem; letter-spacing: 2px; } .status-pulse { width: 10px; height: 10px; background-color: #00ffcc; border-radius: 50%; box-shadow: 0 0 10px #00ffcc; animation: pulse 2s infinite; } @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } } /* Card Grid & 3D Cards */ .card-grid { display: flex; gap: 2rem; perspective: 1000px; } .sys-card { width: 250px; height: 350px; background: rgba(25, 25, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: box-shadow 0.3s ease; transform-style: preserve-3d; } .sys-card:hover { box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); border-color: rgba(0, 255, 204, 0.5); } .card-content { transform: translateZ(30px); pointer-events: none; } .card-content h2 { font-size: 2rem; margin-bottom: 10px; color: #fff; } .card-content p { font-size: 0.9rem; color: #888; } /* Popup / Modal System */ .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1); } .modal-overlay.active { opacity: 1; pointer-events: all; } .modal-box { background: linear-gradient(135deg, #111 0%, #0a0a0c 100%); border: 1px solid #333; padding: 3rem; width: 600px; max-width: 90%; border-radius: 4px; transform: translateY(50px) scale(0.95); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); position: relative; } .modal-overlay.active .modal-box { transform: translateY(0) scale(1); } .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #ff3366; cursor: pointer; font-family: inherit; font-size: 1rem; transition: color 0.3s ease; } .close-btn:hover { color: #fff; text-shadow: 0 0 10px #ff3366; } /* Responsive Design for Mobile */ @media (max-width: 850px) { .card-grid { flex-direction: column; gap: 1rem; } .sys-card { width: 90vw; height: 150px; } } </style> </head> <body> <canvas id="system-bg"></canvas> <main class="interface-container"> <header class="sys-header"> <div class="status-pulse"></div> <h1>DATABASE // <span>ABOUT_ENTITY</span></h1> </header> <section class="card-grid"> <div class="sys-card" data-target="info"> <div class="card-content"> <h2>INFO</h2> <p>Core Directives & Logic</p> </div> </div> <div class="sys-card" data-target="social"> <div class="card-content"> <h2>SOCIAL</h2> <p>Network Uplinks</p> </div> </div> <div class="sys-card" data-target="og"> <div class="card-content"> <h2>OG</h2> <p>Origins & Trajectory</p> </div> </div> </section> </main> <div id="sys-modal" class="modal-overlay"> <div class="modal-box"> <button class="close-btn">[ CLOSE_CONNECTION ]</button> <div class="modal-content" id="modal-dynamic-content"> </div> </div> </div> <script> // --- JAVASCRIPT LOGIC --- // 1. 3D Card Tilt Physics const cards = document.querySelectorAll('.sys-card'); cards.forEach(card => { card.addEventListener('mousemove', (e) => { const rect = card.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const centerX = rect.width / 2; const centerY = rect.height / 2; const rotateX = ((y - centerY) / centerY) * -15; const rotateY = ((x - centerX) / centerX) * 15; card.style.transform = perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05); }); card.addEventListener('mouseleave', () => { card.style.transform = perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1); card.style.transition = transform 0.5s cubic-bezier(0.19, 1, 0.22, 1); }); card.addEventListener('mouseenter', () => { card.style.transition = transform 0.1s linear; }); }); // 2. Popup System (Event Triggers) const modal = document.getElementById('sys-modal'); const closeBtn = document.querySelector('.close-btn'); const modalContent = document.getElementById('modal-dynamic-content'); const systemData = { info: <h2>> INFO_DIRECTIVE</h2><br><p>Current Focus: Developing advanced architectural frameworks, exploring psychological models, and understanding macro-scale systems. Building the foundation for future deployment.</p>, social: <h2>> UPLINKS_ESTABLISHED</h2><br><p>Github: [ SECURE_LINK ]<br>X/Twitter: [ SECURE_LINK ]</p>, og: <h2>> ORIGIN // GOALS</h2><br><p>Trajectory set towards AI development and entrepreneurial ventures. Analyzing data to maximize operational efficiency and rapid learning protocols.</p> }; cards.forEach(card => { card.addEventListener('click', () => { const target = card.getAttribute('data-target'); modalContent.innerHTML = systemData[target]; modal.classList.add('active'); }); }); closeBtn.addEventListener('click', () => { modal.classList.remove('active'); }); // 3. Living Canvas Background (Nodes/Particles) const canvas = document.getElementById('system-bg'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particlesArray = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2; this.speedX = (Math.random() * 1) - 0.5; this.speedY = (Math.random() * 1) - 0.5; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width || this.x < 0) this.speedX *= -1; if (this.y > canvas.height || this.y < 0) this.speedY *= -1; } draw() { ctx.fillStyle = 'rgba(0, 255, 204, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } } function init() { particlesArray = []; for (let i = 0; i < 80; i++) { particlesArray.push(new Particle()); } } function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); for (let j = i; j < particlesArray.length; j++) { const dx = particlesArray[i].x - particlesArray[j].x; const dy = particlesArray[i].y - particlesArray[j].y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 120) { ctx.beginPath(); ctx.strokeStyle = rgba(0, 255, 204, ${0.1 - distance/1200}); ctx.lineWidth = 0.5; ctx.moveTo(particlesArray[i].x, particlesArray[i].y); ctx.lineTo(particlesArray[j].x, particlesArray[j].y); ctx.stroke(); } } } requestAnimationFrame(animate); } init(); animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); // Reinitialize particles so they don't get stuck off-screen }); </script> </body> </html>
