<!DOCTYPE html>
<html>
<head>
  <title>About — next5re</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --violet:#7c3aed;
    }

    body{
      margin:0;
      background:black;
      color:white;
      font-family:'Poppins',sans-serif;
      overflow:hidden;
      animation:boot 0.9s ease;
    }

    @keyframes boot{
      0%{background:#3a0000;}
      100%{background:black;}
    }

    /* ====== LAYOUT ====== */
    .wrap{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 8%;
    }

    /* ====== MENU ====== */
    .menu{
      display:flex;
      flex-direction:column;
      gap:28px;
      letter-spacing:4px;
      font-size:18px;
      user-select:none;
    }

    .menu div{
      opacity:.45;
      cursor:pointer;
      transition:.25s;
      position:relative;
    }

    .menu div:hover{
      opacity:1;
      transform:translateX(12px);
    }

    .menu div::after{
      content:"";
      position:absolute;
      left:-12px;
      top:50%;
      width:0;
      height:1px;
      background:white;
      transition:.25s;
    }

    .menu div:hover::after{
      width:8px;
    }

    /* ====== CORE ====== */
    .core{
      position:relative;
      width:320px;
      height:320px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(124,58,237,.9), transparent 60%);
      filter:blur(70px);
      transition:1s;
    }

    .core.pulse{
      transform:scale(1.4);
      opacity:1;
    }

    /* subtle ambient particles */
    .dust{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .dust i{
      position:absolute;
      width:2px;height:2px;
      background:white;
      opacity:.2;
      animation:drift 10s linear infinite;
    }

    @keyframes drift{
      from{transform:translateY(0)}
      to{transform:translateY(-120vh)}
    }

    /* ====== BACK WARP ====== */
    .warp{
      position:fixed;
      inset:0;
      backdrop-filter:blur(0px);
      transition:.5s;
      pointer-events:none;
    }

    .warp.active{
      backdrop-filter:blur(6px);
    }

    /* ====== PANEL ====== */
    .panel{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) scale(.6);
      width:82%;
      max-width:560px;
      background:rgba(0,0,0,.92);
      border-radius:12px;
      padding:34px 28px;
      opacity:0;
      transition:.45s cubic-bezier(.2,.7,.2,1);
      box-shadow:
        0 0 60px rgba(124,58,237,.15),
        inset 0 0 20px rgba(124,58,237,.1);
    }

    .panel.active{
      transform:translate(-50%,-50%) scale(1);
      opacity:1;
    }

    .close{
      position:absolute;
      right:18px;
      top:12px;
      font-size:18px;
      cursor:pointer;
      opacity:.5;
    }

    .close:hover{opacity:1}

    h2{
      font-family:'Orbitron';
      letter-spacing:5px;
      margin:0 0 12px;
    }

    p{
      opacity:.7;
      line-height:1.7;
      font-size:14px;
    }

    /* ====== MOBILE ====== */
    @media(max-width:768px){
      .wrap{
        flex-direction:column;
        justify-content:center;
        gap:60px;
      }

      .menu{align-items:center}
      .core{width:220px;height:220px}
    }
  </style>
</head>

<body>

<div class="warp" id="warp"></div>

<div class="wrap">

  <!-- MENU -->
  <div class="menu">
    <div onclick="openPanel('info')">INFO</div>
    <div onclick="openPanel('social')">SOCIAL</div>
    <div onclick="openPanel('og')">OG</div>
  </div>

  <!-- CORE -->
  <div class="core" id="core">
    <div class="dust" id="dust"></div>
  </div>

</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="close" onclick="closePanel()">✕</div>
  <div id="content"></div>
</div>

<script>
/* ===== ambient dust ===== */
const dust = document.getElementById("dust");
for(let i=0;i<60;i++){
  let d=document.createElement("i");
  d.style.left=Math.random()*100+"%";
  d.style.top=Math.random()*100+"%";
  d.style.animationDuration=(6+Math.random()*10)+"s";
  dust.appendChild(d);
}

/* ===== content ===== */
function openPanel(type){
  const core = document.getElementById("core");
  const panel = document.getElementById("panel");
  const warp = document.getElementById("warp");

  core.classList.add("pulse");
  warp.classList.add("active");

  let html="";

  if(type==="info"){
    html = `
      <h2>INFO</h2>
      <p>
      I am Nitin — someone who doesn’t just interact with systems, but studies them,
      breaks them down, and rebuilds them with intention.

      I notice details others ignore.
      I prefer depth over noise.
      I don’t rush creation — I refine it.

      What you see here is not a finished identity.
      It’s a system in development.
      </p>
    `;
  }

  if(type==="social"){
    html = `
      <h2>SOCIAL</h2>
      <p>
      +91 7295968932<br><br>
      Direct. No filters.
      </p>
    `;
  }

  if(type==="og"){
    html = `
      <h2>OG</h2>
      <p>
      Developing.<br>
      Testing ideas.<br>
      Building structure.<br><br>

      Not launched.<br>
      Not polished.<br>
      Still evolving.
      </p>
    `;
  }

  document.getElementById("content").innerHTML = html;

  setTimeout(()=>panel.classList.add("active"),120);
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
  document.getElementById("core").classList.remove("pulse");
  document.getElementById("warp").classList.remove("active");
}
</script>

</body>
</html>
