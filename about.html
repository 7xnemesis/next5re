<!DOCTYPE html>
<html>
<head>
  <title>About</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* CORE BACKGROUND */
    .core {
      position: fixed;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #7c3aed, transparent);
      filter: blur(80px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      animation: pulse 4s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
    }

    /* CARDS */
    .cards {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .card {
      width: 200px;
      height: 200px;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      text-align: center;
      letter-spacing: 3px;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: #7c3aed;
    }

    /* MOBILE STACK */
    @media(max-width:768px){
      .cards {
        flex-direction: column;
        gap: 25px;
      }

      .card {
        width: 80%;
        height: 120px;
      }
    }

    /* POPUP */
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;

      opacity: 0;
      pointer-events: none;
      transition: 0.4s;
    }

    .popup.active {
      opacity: 1;
      pointer-events: auto;
    }

    .content {
      max-width: 500px;
    }

    h2 {
      font-family: 'Orbitron';
      letter-spacing: 5px;
    }

    p {
      opacity: 0.7;
      line-height: 1.6;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
    }

    /* BACK BUTTON */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 12px;
      opacity: 0.6;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<div class="core"></div>

<div class="cards">
  <div class="card" onclick="openPopup('info')">INFO</div>
  <div class="card" onclick="openPopup('social')">SOCIAL</div>
  <div class="card" onclick="openPopup('og')">OG</div>
</div>

<div class="popup" id="popup">
  <div class="close" onclick="closePopup()">✕</div>
  <div class="content" id="content"></div>
</div>

<script>

function openPopup(type){
  let html = "";

  if(type==="info"){
    html = `
      <h2>INFO</h2>
      <p>
      I am Nitin — someone who builds ideas into experiences.
      I focus on design, creativity, and creating things that feel different.
      I don’t rush, I refine.
      This is just the beginning.
      </p>`;
  }

  if(type==="social"){
    html = `
      <h2>SOCIAL</h2>
      <p>+91 7295968932</p>`;
  }

  if(type==="og"){
    html = `
      <h2>OG</h2>
      <p>
      Developing...<br>
      Building something bigger.<br>
      Not finished yet.
      </p>`;
  }

  document.getElementById("content").innerHTML = html;
  document.getElementById("popup").classList.add("active");
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

function goBack(){
  document.body.style.opacity="0";
  setTimeout(()=>{ window.location.href="index.html"; },400);
}

</script>

</body>
</html>
