<!DOCTYPE html>
<html>
<head>
  <title>About</title>

  <!-- 📱 IMPORTANT FOR MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #7c3aed, black);
      color: white;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      /* ✨ fade in */
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .box {
      background: rgba(0, 0, 0, 0.5);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    a {
      color: #7c3aed;
      text-decoration: none;
      font-size: 1.2rem;
    }

    a:hover {
      text-shadow: 0 0 10px #7c3aed;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>About Me</h1>
  <p>I am Nitin aka 7xnemesis 🚀</p>

  <p>
    <a href="https://instagram.com/7xnemesis" target="_blank">
      @7xnemesis
    </a>
  </p>

  <br>

  <a href="index.html">⬅ Back</a>
</div>

</body>
</html>
