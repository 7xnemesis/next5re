<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* BLACKHOLE CLOSE */
.blackhole{
position:fixed;
width:200vw;
height:200vh;
background:black;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
animation:close 1s forwards;
}

@keyframes close{
to{transform:translate(-50%,-50%) scale(0);}
}

/* CARD */
.card{
opacity:0;
animation:fade 1s forwards;
animation-delay:1s;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
}

@keyframes fade{to{opacity:1;}}

.btn{
margin-top:15px;
padding:10px 20px;
border-radius:20px;
background:rgba(255,255,255,0.1);
cursor:pointer;
}

/* BACK */
.back{
position:fixed;
top:20px;
left:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="blackhole"></div>

<div class="back" onclick="goBack()">← Back</div>

<div class="card">
<img src="eye1.jpeg" width="100" style="border-radius:50%">
<h2>sxy.nemesis</h2>
<p>@sxy.nemesis</p>
<div class="btn" onclick="openYT()">Open Channel</div>
</div>

<script>
function openYT(){
window.open("https://youtube.com/@sxy.nemesis");
}

function goBack(){
let bh=document.createElement("div");
bh.style.position="fixed";
bh.style.width="20px";
bh.style.height="20px";
bh.style.background="black";
bh.style.borderRadius="50%";
bh.style.top="50%";
bh.style.left="50%";
bh.style.transform="translate(-50%,-50%) scale(0)";
bh.style.transition="1s";
document.body.appendChild(bh);

setTimeout(()=>{bh.style.width="200vw";bh.style.height="200vh";},10);

setTimeout(()=>{
window.location.href="./index.html";
},1000);
}
</script>

</body>
</html>
