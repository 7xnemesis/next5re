<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* BLACKHOLE CLOSE */
.blackhole{
position:fixed;
width:200vw;
height:200vh;
background:black;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
animation:collapse 1.2s forwards;
}

@keyframes collapse{
to{
transform:translate(-50%,-50%) scale(0);
}
}

/* CARD */
.card{
opacity:0;
animation:fade 1s forwards;
animation-delay:1s;

padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
}

@keyframes fade{
to{opacity:1;}
}

.pfp{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:15px;
}

.btn{
margin-top:15px;
padding:10px 20px;
border-radius:20px;
background:rgba(255,255,255,0.1);
cursor:pointer;
}
</style>
</head>

<body>

<div class="blackhole"></div>

<div class="card">
<img class="pfp" src="eye1.jpeg">
<h2>sxy.nemesis</h2>
<p>@sxy.nemesis</p>
<div class="btn" onclick="goYT()">Open Channel</div>
</div>

<script>
function goYT(){
window.open("https://youtube.com/@sxy.nemesis","_blank");
}
</script>

</body>
</html>
