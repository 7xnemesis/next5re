<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>next5re | Nexus</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* BLACKHOLE ENTRY */
.blackhole{
position:fixed;
width:200vw;
height:200vh;
background:black;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
z-index:10;
animation:open 1s forwards;
}

@keyframes open{
0%{transform:translate(-50%,-50%) scale(1);}
100%{transform:translate(-50%,-50%) scale(0);}
}

/* CARD */
.card{
padding:30px;
border-radius:25px;
text-align:center;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);

box-shadow:0 10px 40px rgba(0,0,0,0.5);

opacity:0;
transform:translateY(30px);
animation:fade 1s forwards;
animation-delay:0.8s;
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}

/* PROFILE */
.pfp{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:2px solid rgba(255,255,255,0.3);
}

.name{
font-size:22px;
font-weight:600;
margin-bottom:5px;
}

.handle{
font-size:14px;
opacity:0.7;
margin-bottom:15px;
}

/* BUTTON */
.btn{
padding:10px 25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- BLACKHOLE -->
<div class="blackhole"></div>

<!-- CARD -->
<div class="card">
<img class="pfp" src="https://i.imgur.com/6pW8xXG.jpg">

<div class="name">sxy.nemesis</div>
<div class="handle">@sxy.nemesis</div>

<div class="btn" onclick="openYT()">Visit Channel</div>
</div>

<script>
function openYT(){
window.open("https://youtube.com/@sxy.nemesis","_blank");
}
</script>

</body>
</html>
