<!DOCTYPE html>
<html>
<head>
  <title>next5re</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111, black);
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* center layout */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 10px;
      color: white;
    }

    p {
      opacity: 0.6;
      letter-spacing: 2px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* floating circle effect */
    .orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #7c3aed, transparent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      filter: blur(40px);
      animation: float 6s infinite ease-in-out;
      z-index: -1;
    }

    @keyframes float {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -55%) scale(1.1); }
    }

    a {
      color: white;
      text-decoration: none;
    }

  </style>
</head>

<body>

<div class="orb"></div>

<div class="content">
  <h1>NEXT5RE</h1>
  <p>DESIGNING YOUR WORLD</p>

  <button class="btn" onclick="goNext()">ENTER</button>

  <p style="margin-top:15px;">
    <a href="https://instagram.com/7xnemesis" target="_blank">
      @7xnemesis
    </a>
  </p>
</div>

<script>
function goNext() {
  document.body.style.transition = "0.5s";
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "about.html";
  }, 500);
}
</script>

</body>
</html>
