<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>next5re</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
height:100vh;
background:black;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg img{
position:absolute;
width:300px;
opacity:0.2;
filter:blur(6px);
}
.bg img:nth-child(1){top:10%;left:5%;}
.bg img:nth-child(2){bottom:10%;right:5%;}
.bg img:nth-child(3){top:50%;left:40%;}
.bg img:nth-child(4){top:20%;right:30%;}

/* NAV */
.nav{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:20px;
padding:10px 20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
}

.nav a{cursor:pointer}

/* MAIN */
.main{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
}

.logo{
font-size:90px;
background:linear-gradient(90deg,#fff,#ff2a2a);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:12px 30px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

/* BLACKHOLE */
.blackhole{
position:fixed;
width:20px;
height:20px;
background:black;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
z-index:100;
transition:1.2s cubic-bezier(.8,0,.2,1);
}

.blackhole.active{
width:200vw;
height:200vh;
transform:translate(-50%,-50%) scale(1);
}

/* FADE CONTENT */
.fade{
transition:0.5s;
}
.fade.hide{
opacity:0;
transform:scale(0.9);
}

</style>
</head>

<body>

<div class="bg fade" id="content">
<img src="eye1.jpeg">
<img src="eye2.jpeg">
<img src="eye3.jpeg">
<img src="eye4.jpeg">

<div class="nav">
<a onclick="openAbout()">About</a>
<a onclick="openContact()">Contact</a>
</div>

<div class="main">
<div class="logo">next5re</div>
<div class="btn" onclick="openAbout()">About Me</div>
<div class="btn" onclick="enterNexus()">Enter Nexus</div>
</div>
</div>

<div class="blackhole" id="bh"></div>

<script>
function enterNexus(){
document.getElementById("content").classList.add("hide");
let bh=document.getElementById("bh");
bh.classList.add("active");

setTimeout(()=>{
window.location.href="next.html";
},1100);
}

function openAbout(){alert("About coming soon");}
function openContact(){alert("Contact popup here");}
</script>

</body>
</html>
