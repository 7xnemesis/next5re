<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>next5re</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* BODY */
body {
    height: 100vh;
    background: #ffffff;
    overflow: hidden;
}

/* NAVBAR */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: flex-end;
    gap: 30px;
    z-index: 10;
}

.nav a {
    text-decoration: none;
    color: black;
    font-size: 16px;
    font-weight: 500;
    transition: 0.3s;
}

.nav a:hover {
    opacity: 0.6;
}

/* LOGO CENTER */
.main {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: 2px;
}

/* BACKGROUND IMAGES */
.bg img {
    position: absolute;
    width: 300px;
    opacity: 0.1;
    filter: blur(2px);
}

.bg img:nth-child(1) { top: 10%; left: 10%; }
.bg img:nth-child(2) { bottom: 10%; right: 10%; }
.bg img:nth-child(3) { top: 60%; left: 40%; }

/* GLASS POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 300px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.popup.active {
    transform: translate(-50%, -50%) scale(1);
}

.popup h2 {
    margin-bottom: 10px;
}

.popup button {
    margin-top: 15px;
    padding: 8px 20px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="/about">About</a>
    <a href="#" onclick="openPopup()">Contact</a>
</div>

<!-- BACKGROUND IMAGES -->
<div class="bg">
    <img src="https://picsum.photos/300?1">
    <img src="https://picsum.photos/300?2">
    <img src="https://picsum.photos/300?3">
</div>

<!-- MAIN LOGO -->
<div class="main">
    <div class="logo">next5re</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h2>Contact</h2>
    <p>Email: next5re@gmail.com</p>
    <button onclick="closePopup()">Close</button>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
