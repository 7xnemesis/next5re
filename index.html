<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>next5re</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body{
height:100vh;
background:black;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.bg img{
position:absolute;
width:320px;
opacity:0.25;
filter:blur(6px);
}

/* positions */
.bg img:nth-child(1){top:10%;left:5%;}
.bg img:nth-child(2){bottom:5%;right:5%;}
.bg img:nth-child(3){top:50%;left:40%;}
.bg img:nth-child(4){top:20%;right:30%;}

/* NAVBAR */
.nav{
position:fixed;
top:20px;
right:20px;
padding:12px 25px;
border-radius:20px;
display:flex;
gap:25px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);

box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.nav a{
color:white;
text-decoration:none;
font-size:15px;
transition:0.3s;
}

.nav a:hover{
color:#ff2a2a;
}

/* MAIN */
.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.logo{
font-size:90px;
font-weight:700;
letter-spacing:3px;

background:linear-gradient(90deg,#fff,#ff2a2a);
-webkit-background-clip:text;
color:transparent;

text-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:300px;
padding:25px;
border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);

text-align:center;
transition:0.3s;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.popup button{
margin-top:15px;
padding:8px 20px;
border:none;
background:#ff2a2a;
color:white;
border-radius:10px;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
opacity:0;
pointer-events:none;
transition:0.3s;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

/* MOBILE FIX */
@media(max-width:768px){
.logo{
font-size:50px;
}
.bg img{
width:200px;
}
}
</style>
</head>

<body>

<!-- BACKGROUND IMAGES -->
<div class="bg">
<img src="eye1.jpeg">
<img src="eye2.jpeg">
<img src="eye3.jpeg">
<img src="eye4.jpeg">
</div>

<!-- NAV -->
<div class="nav">
<a href="about.html">About</a>
<a href="#" onclick="openPopup()">Contact</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="logo">next5re</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<h2>Contact</h2>
<p>next5re@gmail.com</p>
<button onclick="closePopup()">Close</button>
</div>

<script>
function openPopup(){
document.getElementById("popup").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
