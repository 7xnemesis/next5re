<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>next5re</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{background:black;color:white;height:100vh;overflow:hidden;}

/* BACKGROUND */
.bg img{
position:absolute;
width:300px;
opacity:0.2;
filter:blur(6px);
}
.bg img:nth-child(1){top:10%;left:5%;}
.bg img:nth-child(2){bottom:10%;right:5%;}
.bg img:nth-child(3){top:50%;left:40%;}
.bg img:nth-child(4){top:20%;right:30%;}

/* NAV */
.nav{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:20px;
padding:10px 20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
z-index:10;
}

.nav a{cursor:pointer}

/* MAIN */
.main{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
}

.logo{
font-size:80px;
background:linear-gradient(90deg,#fff,#ff2a2a);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:12px 30px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
transition:0.3s;
z-index:20;
}

.popup.active{transform:translate(-50%,-50%) scale(1);}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:15;
}

.overlay.active{opacity:1;pointer-events:all;}

/* CONTACT BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
justify-content:center;
}

.action-btn{
padding:8px 15px;
border-radius:20px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.action-btn:hover{
background:rgba(255,255,255,0.2);
}

/* BLACKHOLE */
.blackhole{
position:fixed;
width:20px;
height:20px;
background:black;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
z-index:100;
transition:1s;
}

.blackhole.active{
width:200vw;
height:200vh;
transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<div class="bg">
<img src="eye1.jpeg">
<img src="eye2.jpeg">
<img src="eye3.jpeg">
<img src="eye4.jpeg">
</div>

<div class="nav">
<a onclick="openAbout()">About</a>
<a onclick="openContact()">Contact</a>
</div>

<div class="main">
<div class="logo">next5re</div>
<div class="btn" onclick="enterNexus()">Enter Nexus</div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="popup" id="about">
<h2>About</h2>
<p>next5re — futuristic creative experience.</p>
<button onclick="closeAll()">Close</button>
</div>

<div class="popup" id="contact">
<h2>Contact</h2>
<p>Email: next5re@gmail.com</p>
<p>Phone: +91 7295968932</p>

<div class="actions">
<a href="tel:+917295968932" class="action-btn">📞 Call</a>
<a href="https://wa.me/917295968932" class="action-btn">💬 WhatsApp</a>
<a href="mailto:next5re@gmail.com" class="action-btn">✉️ Email</a>
</div>

<button onclick="closeAll()">Close</button>
</div>

<div class="blackhole" id="bh"></div>

<script>
function openAbout(){
document.getElementById("about").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function openContact(){
document.getElementById("contact").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeAll(){
document.getElementById("about").classList.remove("active");
document.getElementById("contact").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function enterNexus(){
document.getElementById("bh").classList.add("active");

setTimeout(()=>{
window.location.href="./next.html";
},1000);
}
</script>

</body>
</html>
