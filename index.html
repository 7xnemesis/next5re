<!DOCTYPE html>
<html>
<head>
  <title>next5re</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      color: white;
      background: black;
    }

    /* VIDEO BACKGROUND */
    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* DARK OVERLAY (IMPORTANT FIX) */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    /* NAVBAR */
    .nav {
      position: fixed;
      top: 20px;
      right: 40px;
      display: flex;
      gap: 25px;
      font-size: 14px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      opacity: 0.7;
    }

    .nav a:hover {
      opacity: 1;
    }

    /* SECTION */
    .section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      letter-spacing: 10px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    p {
      opacity: 0.7;
      letter-spacing: 2px;
      margin-top: 10px;
    }

    /* BUTTON */
    .btn {
      margin-top: 25px;
      padding: 10px 28px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* 3D EFFECT */
    .title {
      transform: perspective(600px) rotateX(10deg);
    }

    /* SECOND SECTION */
    .section2 {
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h2 {
      font-family: 'Orbitron';
      letter-spacing: 5px;
    }

  </style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- NAV -->
<div class="nav">
  <a href="#">About</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<!-- HERO -->
<div class="section">
  <h1 class="title">NEXT5RE</h1>
  <p>ENTER THE VOID</p>

  <button class="btn" onclick="scrollNext()">ENTER</button>
</div>

<!-- SECOND SECTION -->
<div class="section2">
  <h2>ABOUT ME</h2>
  <p>I am Nitin aka 7xnemesis 🚀</p>
</div>

<script>
function scrollNext() {
  window.scrollTo({
    top: window.innerHeight,
    behavior: "smooth"
  });
}
</script>

</body>
</html>
