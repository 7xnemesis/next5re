<!DOCTYPE html>
<html>
<head>
  <title>next5re</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(40%);
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 60px;
      color: #7c3aed;
      text-shadow: 0 0 20px #7c3aed;
    }

    .btn {
      padding: 10px 25px;
      border: 1px solid #7c3aed;
      background: transparent;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #7c3aed;
    }
  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="content">
  <h1>NEXT5RE</h1>
  <p>enter the void 🌑</p>
  <button class="btn" onclick="toggleMusic()">Play Music</button>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
  let music = document.getElementById("music");

  function toggleMusic() {
    if (music.paused) music.play();
    else music.pause();
  }
</script>

</body>
</html>
