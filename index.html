<!DOCTYPE html>
<html>
<head>
  <title>next5re</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.4), black);
      z-index: -2;
    }

    /* CENTER CORE */
    .core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #7c3aed, transparent);
      filter: blur(30px);
      opacity: 0.6;
    }

    /* TITLE */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron';
      letter-spacing: 12px;
      font-size: 2.5rem;
    }

    .enter {
      margin-top: 20px;
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.6;
      cursor: pointer;
    }

    .enter:hover {
      opacity: 1;
    }

    /* SYMBOL */
    .symbol {
      position: absolute;
      color: white;
      opacity: 0.12;
      font-size: 14px;
      pointer-events: none;
      transition: 0.5s;
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="core" id="core"></div>

<div class="title">
  <h1>NEXT5RE</h1>
  <div class="enter" onclick="activate()">INITIATE</div>
</div>

<script>

// SYMBOL FIELD (spread properly)
const symbols = ["<>","//","{}","##","01","++","==","$","@@","**"];
let elements = [];

for(let i=0;i<40;i++){
  let s=document.createElement("div");
  s.className="symbol";
  s.innerText=symbols[Math.floor(Math.random()*symbols.length)];

  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.fontSize=(10 + Math.random()*12)+"px";

  document.body.appendChild(s);
  elements.push(s);
}


// LEGENDARY TRANSITION
function activate(){

  // STEP 1: orbit pull
  elements.forEach((el,i)=>{
    let angle = (i / elements.length) * Math.PI * 2;
    let radius = 80;

    let x = Math.cos(angle) * radius;
    let y = Math.sin(angle) * radius;

    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = `translate(${x}px, ${y}px)`;
    el.style.opacity = "0.8";
  });

  // STEP 2: collapse into core
  setTimeout(()=>{
    elements.forEach(el=>{
      el.style.transform = "translate(0,0) scale(0.5)";
      el.style.opacity = "0.3";
    });

    document.getElementById("core").style.transform = "translate(-50%, -50%) scale(2)";
    document.getElementById("core").style.opacity = "1";
  },600);

  // STEP 3: pulse + blackout
  setTimeout(()=>{
    document.body.style.transition="0.6s";
    document.body.style.background="black";
    document.body.style.opacity="0";
  },1200);

  // STEP 4: enter next world
  setTimeout(()=>{
    window.location.href="about.html";
  },1800);
}

</script>

</body>
</html>
